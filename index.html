<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monica's Netflix</title>
    <style>
        body { background: #111; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #181818; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 15px; text-align: left; }
        .btn-watch { background: #e50914; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; border-radius: 4px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1 style="color: #e50914; padding-top: 20px;">NETFLIX</h1>
    <div id="movies" class="movie-grid">Loading movies...</div>

    <script>
        // USING YOUR RENDER URL
        const API_URL = "https://monica-netflix.onrender.com/api/movies";

        async function getMovies() {
            try {
                const response = await fetch(API_URL);
                const movies = await response.json();
                const container = document.getElementById('movies');
                
                container.innerHTML = movies.map(movie => `
                    <div class="card">
                        <img src="${movie.posterUrl}" alt="${movie.title}">
                        <div class="card-content">
                            <h3>${movie.title}</h3>
                            <p>${movie.description || movie.Description || ""}</p>
                            
                            <a href="${movie.trailerUrl || movie.trailer}" target="_blank" class="btn-watch">
                                Watch Trailer
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('movies').innerHTML = "Error loading movies. Check your Render URL!";
            }
        }

        getMovies();
    </script>
</body>
</html>
