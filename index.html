<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monica's Netflix</title>
    <style>
        body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; }
        .movie-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .movie-card { background: #222; width: 250px; border-radius: 10px; padding: 10px; }
        .movie-card img { width: 100%; border-radius: 5px; }
        .btn-watch { background: #e50914; color: white; padding: 8px 15px; text-decoration: none; display: inline-block; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Netflix Collection</h1>
    <div id="movie-list" class="movie-container">
        </div>

    <script>
        // Replace this URL with your actual Azure Backend URL
        const API_URL = "https://your-backend-app.azurewebsites.net/api/movies";

        async function loadMovies() {
            const response = await fetch(API_URL);
            const movies = await response.json();
            const list = document.getElementById('movie-list');

            list.innerHTML = movies.map(movie => `
                <div class="movie-card">
                    <img src="${movie.posterUrl}" alt="${movie.title}">
                    <h3>${movie.title}</h3>
                    <p>${movie.description || movie.Description || "No description available"}</p>
                    
                    <a href="${movie.trailerUrl}" target="_blank" class="btn-watch">Watch Trailer</a>
                </div>
            `).join('');
        }

        loadMovies();
    </script>
</body>
</html>
